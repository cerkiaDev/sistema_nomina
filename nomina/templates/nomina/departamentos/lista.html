<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Departamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard/">Sistema de Nómina</a>
            <a href="/dashboard/" class="btn btn-outline-light">Dashboard</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Departamentos</h2>
            <a href="/departamentos/nuevo/" class="btn btn-success">+ Nuevo Departamento</a>
        </div>

        <table class="table table-striped table-hover shadow">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for departamento in departamentos %}
                <tr>
                    <td>{{ departamento.dept_no }}</td>
                    <td>{{ departamento.dept_name }}</td>
                    <td>
                        <a href="/departamentos/{{ departamento.dept_no }}/editar/"class="btn btn-sm btn-warning">Editar</a>
                        <a href="/departamentos/{{ departamento.dept_no }}/desactivar/"class="btn btn-sm btn-danger">Desactivar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center">No hay departamentos registrados.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
