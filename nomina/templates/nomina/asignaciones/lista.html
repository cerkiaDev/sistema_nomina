<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Asignaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard/">Sistema de Nómina</a>
            <a href="/dashboard/" class="btn btn-outline-light">Dashboard</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Asignaciones a Departamentos</h2>
            <a href="/asignaciones/nueva/" class="btn btn-success">+ Nueva Asignación</a>
        </div>

        <table class="table table-striped table-hover shadow">
            <thead class="table-primary">
                <tr>
                    <th>Empleado</th>
                    <th>Departamento</th>
                    <th>Desde</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for asignacion in asignaciones %}
                <tr>
                    <td>{{ asignacion.employee }}</td>
                    <td>{{ asignacion.dept }}</td>
                    <td>{{ asignacion.from_date }}</td>
                    <td>
                        <a href="/asignaciones/{{ asignacion.id }}/terminar/" class="btn btn-sm btn-danger">Terminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center">No hay asignaciones activas.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
